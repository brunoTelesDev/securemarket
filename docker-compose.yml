version: '3.8'

services:
  # O seu banco de dados (mantive exatamente as suas credenciais!)
  postgres-db:
    image: postgres:16
    container_name: securemarket-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: securemarket_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - market-network

  # A sua API Java conectada ao seu banco
  api-app:
    build: .
    container_name: securemarket-api
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db # Garante que o banco sobe ANTES do Java tentar conectar
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/securemarket_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=adminpassword
    networks:
      - market-network

volumes:
  postgres_data:

networks:
  market-network:
    driver: bridge